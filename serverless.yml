service: bonzai-booking

custom:
  tableName: bonzai-booking-Bookings   # <- definiera EN gång här

provider:
  name: aws
  runtime: nodejs20.x
  region: eu-north-1
  profile: ${opt:aws-profile, 'default'}

  environment:
    TABLE_NAME: ${self:custom.tableName}        # <- använd här

  iamRoleStatements:                            # Lambda-behörigheter till just vår tabell
    - Effect: Allow
      Action:
        - dynamodb:PutItem
        - dynamodb:GetItem
        - dynamodb:UpdateItem
        - dynamodb:DeleteItem
      Resource:
        - arn:aws:dynamodb:${self:provider.region}:*:table/${self:custom.tableName}  # <- och här

functions:
  createBooking:
    handler: createBooking/index.handler
    events:
      - http:
          path: bookings
          method: post
          cors: true

  getBookings:
    handler: getBookings/index.handler
    events:
      - http:
          path: bookings
          method: get

resources:
  Resources:
    BookingsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:custom.tableName}     # <- och här
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: bookingId
            AttributeType: S
        KeySchema:
          - AttributeName: bookingId
            KeyType: HASH
