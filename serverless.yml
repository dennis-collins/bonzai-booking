service: bonzai-booking

provider:
  name: aws
  runtime: nodejs20.x
  region: eu-north-1
  profile: ${opt:aws-profile, 'default'} # använder sig av default profilen om ingen annan anges

  enivonment:
    TABLE_NAME: ${self:service}-Bookings # dynamodb tabell namn, miljövariabel som skickas in i alla lambdas, gör att koden kan läsa tabellnamnet via process.env.TABLE_NAME

iamRoleStatements: # Här definierar vilka rättigheter våra lambdas ska ha
    - Effect: Allow
      Action: # tillåter vilka actions som lambdan får göra
        - dynamodb:PutItem
        - dynamodb:GetItem
        - dynamodb:UpdateItem
        - dynamodb:DeleteItem
      Resource:
        - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.TABLE_NAME}


functions:
  createBooking:
    handler: createBooking/index.handler
    events:
      - http:
          path: bookings
          method: post
          cors: true

resources:
  Resources:
    BookingsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: Bookings
        AttributeDefinitions:
          - AttributeName: bookingId
            AttributeType: S
        KeySchema:
          - AttributeName: bookingId
            KeyType: HASH
        BillingMode: PAY_PER_REQUEST
 
